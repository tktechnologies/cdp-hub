name: CD - Production

on:
  workflow_dispatch:
    inputs:
      deploy_scraper:
        description: Deploy scraper API + worker images
        type: boolean
        default: false
      deploy_stokapi_api:
        description: Deploy StokAPI API image
        type: boolean
        default: false
      deploy_stokapi_worker:
        description: Deploy StokAPI worker image
        type: boolean
        default: false
      sync_n8n:
        description: Publish production n8n workflows (make sync-n8n)
        type: boolean
        default: false

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  RESOURCE_GROUP: automation
  ACR_NAME: cdpscraperprodacr
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy scraper API and worker
        if: inputs.deploy_scraper
        env:
          API_APP_NAME: cdp-scrapers-api-prod
          WORKER_APP_NAME: cdp-scrapers-worker-prod
        run: bash scripts/deploy-scraper-image.sh

      - name: Deploy StokAPI API
        if: inputs.deploy_stokapi_api
        env:
          TAG: ${{ env.IMAGE_TAG }}
        run: bash muvstok-api/scripts/deploy_muv_api.sh

      - name: Deploy StokAPI worker
        if: inputs.deploy_stokapi_worker
        env:
          TAG: ${{ env.IMAGE_TAG }}
        run: bash muvstok-api/scripts/deploy_muv_worker.sh

      - name: Sync production n8n workflows
        if: inputs.sync_n8n
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_MCP_AUTH_HEADER: ${{ secrets.N8N_MCP_AUTH_HEADER }}
          CDP_PROGRESS_WORKFLOW_ID: ${{ vars.CDP_PROGRESS_WORKFLOW_ID }}
          CDP_NOTIFIER_WORKFLOW_ID: ${{ vars.CDP_NOTIFIER_WORKFLOW_ID }}
        run: make sync-n8n
